name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild build \
            -scheme Chromafield \
            -project Chromafield.xcodeproj \
            -destination 'generic/platform=iOS'
